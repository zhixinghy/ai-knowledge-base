name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --ignore-scripts 跳过 onnxruntime 大文件下载(线上用 DashScope,不需要)
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Build (Next standalone)
        run: npm run build

      # standalone 默认不含 public 和 static,手动拷进去
      - name: Assemble standalone bundle
        run: |
          cp -r public .next/standalone/ 2>/dev/null || true
          cp -r .next/static .next/standalone/.next/

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # 把产物同步到服务器 /root/cortex(--delete 清理旧文件;数据/密钥在别处,不受影响)
      - name: Deploy to server
        run: |
          rsync -az --delete \
            .next/standalone/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/root/cortex/"
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "systemctl restart cortex && sleep 2 && systemctl --no-pager status cortex | head -5"
