name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --ignore-scripts 跳过 onnxruntime 大文件下载(线上用 DashScope,不需要)
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Build (Next standalone)
        run: npm run build

      # standalone 默认不含 public 和 static,拷进去
      - name: Assemble bundle
        run: |
          cp -r public .next/standalone/ 2>/dev/null || true
          cp -r .next/static .next/standalone/.next/

      # 私钥以 base64 单行存在 SSH_KEY_B64,解码还原为精确字节
      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY_B64: ${{ secrets.SSH_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # 打包产物 → 经 ssh 管道传到服务器 → 解包 → 重启
          tar czf - -C .next/standalone . | ssh -i ~/.ssh/id_deploy \
            "$SSH_USER@$SSH_HOST" \
            "rm -rf /root/cortex && mkdir -p /root/cortex && tar xzf - -C /root/cortex && systemctl restart cortex && sleep 2 && systemctl --no-pager status cortex | head -6"
