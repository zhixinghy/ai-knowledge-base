name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --ignore-scripts 跳过 onnxruntime 大文件下载(线上用 DashScope,不需要)
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Build (Next standalone)
        run: npm run build

      # standalone 默认不含 public 和 static,拷进去后打包成一个 tar
      - name: Assemble bundle
        run: |
          cp -r public .next/standalone/ 2>/dev/null || true
          cp -r .next/static .next/standalone/.next/
          tar czf cortex.tar.gz -C .next/standalone .

      # 用 appleboy(golang,key 解析宽容)上传产物
      - name: Upload bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: cortex.tar.gz
          target: /root

      # 解包到 /root/cortex 并重启服务(数据/密钥在别处,不受影响)
      - name: Extract & restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            rm -rf /root/cortex && mkdir -p /root/cortex
            tar xzf /root/cortex.tar.gz -C /root/cortex
            rm -f /root/cortex.tar.gz
            systemctl restart cortex
            sleep 2
            systemctl --no-pager status cortex | head -6
